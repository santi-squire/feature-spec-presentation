<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services Management — Spec</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0D0D0D; --surface: #1A1A1A; --surface-2: #262626;
      --border: #333333; --text: #FFFFFF; --text-muted: #B3B3B3;
      --accent: #007FFF; --accent-light: #279FFF;
      --green: #31AD5A; --orange: #F4983B; --red: #EB4646;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
    .container { max-width: 860px; margin: 0 auto; padding: 3rem 2rem; }
    .back { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--accent-light); text-decoration: none; font-size: 0.82rem; font-weight: 600; margin-bottom: 2rem; }
    .back:hover { text-decoration: underline; }

    /* Markdown rendered styles */
    .md h1 { font-size: 1.8rem; font-weight: 800; margin: 0 0 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem; }
    .md h2 { font-size: 1.35rem; font-weight: 700; margin: 2rem 0 0.8rem; color: var(--accent-light); }
    .md h3 { font-size: 1.1rem; font-weight: 700; margin: 1.5rem 0 0.5rem; }
    .md h4 { font-size: 0.95rem; font-weight: 700; margin: 1.2rem 0 0.4rem; }
    .md p { color: var(--text-muted); margin-bottom: 0.6rem; }
    .md strong { color: var(--text); }
    .md blockquote { border-left: 3px solid var(--accent); padding: 0.5rem 1rem; margin: 0.8rem 0; background: var(--surface); border-radius: 0 8px 8px 0; }
    .md blockquote p { color: var(--text-muted); margin: 0; }
    .md ul, .md ol { color: var(--text-muted); padding-left: 1.5rem; margin-bottom: 0.8rem; }
    .md li { margin-bottom: 0.3rem; }
    .md li::marker { color: var(--accent-light); }
    .md code { background: var(--surface-2); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.82rem; color: var(--accent-light); }
    .md pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; overflow-x: auto; margin: 0.8rem 0; }
    .md pre code { background: none; padding: 0; font-size: 0.78rem; color: var(--text-muted); }
    .md table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.82rem; }
    .md th, .md td { padding: 0.5rem 0.8rem; border: 1px solid var(--border); text-align: left; }
    .md th { background: var(--surface-2); color: var(--text-muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .md td { color: var(--text-muted); }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .md a { color: var(--accent-light); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md input[type="checkbox"] { margin-right: 0.4rem; accent-color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="index.html">&#8592; Back to presentation</a>
    <div class="md" id="content"></div>
  </div>
  <script>
    fetch('services_management_spec.md')
      .then(r => r.text())
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); });
  </script>
</body>
</html>
